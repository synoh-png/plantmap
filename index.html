<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>태양광 발전소 통합 관리 시스템</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Rounded" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0062FF;
            --primary-light: #EBF3FF;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --border: rgba(0, 0, 0, 0.08);
            --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.15);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* 검색창 컨테이너 */
        .search-container {
            position: fixed;
            top: 20px; left: 20px; right: 20px;
            z-index: 1000;
            max-width: 500px;
        }

        .search-box {
            display: flex; align-items: center;
            background: var(--bg-glass);
            border-radius: 28px; padding: 4px 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border: 1px solid white;
        }

        .search-input {
            width: 100%; border: none; background: transparent;
            padding: 12px 0; font-size: 16px; outline: none;
        }

        /* [핵심 수정] 2단 구조 검색 결과창 */
        .autocomplete-list {
            margin-top: 12px;
            background: var(--bg-glass);
            border-radius: 20px;
            max-height: 450px;
            display: none; /* 스크립트에서 flex로 전환 */
            overflow: hidden;
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border);
        }

        /* 왼쪽: 지역 선택 사이드바 */
        .region-sidebar {
            width: 130px;
            background: #F2F2F7;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .region-btn {
            width: 100%; padding: 15px 16px; border: none;
            background: transparent; text-align: left;
            font-size: 14px; font-weight: 600; cursor: pointer;
            color: var(--text-sub); transition: 0.2s;
        }

        .region-btn.active {
            background: white; color: var(--primary); font-weight: 800;
        }

        /* 오른쪽: 발전소 리스트 */
        .plant-results {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        .autocomplete-item {
            padding: 16px 20px; border-bottom: 1px solid #F2F2F7; cursor: pointer;
        }

        .autocomplete-item:hover { background: var(--primary-light); }
        .auto-name { display: block; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .auto-info { display: block; font-size: 12px; color: var(--text-sub); }

        /* 하단 시트 및 기타 UI 생략 (기존 스타일 유지) */
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 28px; border-top-right-radius: 28px; transform: translateY(110%); transition: 0.4s; z-index: 1001; padding: 24px; }
        .bottom-sheet.open { transform: translateY(0); }
    </style>
</head>

<body>
    <div class="search-container" id="searchContainer">
        <div class="search-box">
            <span class="material-icons-rounded" style="color:var(--primary); margin-right:8px;">search</span>
            <input type="text" id="searchInput" class="search-input" placeholder="발전소명 검색 또는 지역 선택">
        </div>
        <div id="autocompleteList" class="autocomplete-list">
            </div>
    </div>

    <div id="map"></div>

    <div class="bottom-sheet" id="bottomSheet">
        <h2 id="sheetName" style="margin-top:0;"></h2>
        <p id="sheetAddress" style="color:var(--text-sub);"></p>
        <p>설비용량: <span id="sheetCapacity" style="font-weight:bold; color:var(--primary);"></span></p>
        <button onclick="document.getElementById('bottomSheet').classList.remove('open')" style="width:100%; padding:12px; border-radius:12px; border:none; background:#F2F2F7;">닫기</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([33.38, 126.55], 10);
        L.tileLayer('https://xdworld.vworld.kr/2d/white/service/{z}/{x}/{y}.png').addTo(map);

        let powerPlantsData = [];
        const autocompleteList = document.getElementById('autocompleteList');
        const searchInput = document.getElementById('searchInput');

        // CSV 데이터 로드
        Papa.parse('제주자원.csv', {
            download: true, header: true, skipEmptyLines: true, encoding: 'EUC-KR',
            complete: function(results) {
                powerPlantsData = results.data.map((row, idx) => ({
                    name: row['발전소명'],
                    capacity: row['용량'],
                    address: row['주소'],
                    lat: parseFloat(row['Latitude']),
                    lng: parseFloat(row['Longitude']),
                    control: row['제어방식'],
                    _idx: idx
                })).filter(p => !isNaN(p.lat));
                renderMarkers();
            }
        });

        function renderMarkers() {
            powerPlantsData.forEach(p => {
                const marker = L.circleMarker([p.lat, p.lng], {
                    radius: 8, fillColor: "#0062FF", color: "#fff", weight: 2, fillOpacity: 0.8
                }).addTo(map);
                marker.on('click', () => openSheet(p));
            });
        }

        // [핵심 기능] 검색창 클릭/입력 시 2단 UI 출력
        function renderSearchUI(filterText = "") {
            const filtered = powerPlantsData.filter(p => p.name.includes(filterText));
            
            // 지역별 그룹화
            const grouped = {};
            filtered.forEach(p => {
                const region = p.address.split(' ')[0] || "기타";
                if (!grouped[region]) grouped[region] = [];
                grouped[region].push(p);
            });

            const regions = Object.keys(grouped).sort();
            
            autocompleteList.style.display = 'flex';
            autocompleteList.innerHTML = `
                <div class="region-sidebar" id="regionSidebar"></div>
                <div class="plant-results" id="plantResults"></div>
            `;

            const sidebar = document.getElementById('regionSidebar');
            const resultsArea = document.getElementById('plantResults');

            regions.forEach((reg, i) => {
                const btn = document.createElement('button');
                btn.className = `region-btn ${i === 0 ? 'active' : ''}`;
                btn.textContent = reg;
                btn.onclick = () => {
                    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    displayPlants(grouped[reg], resultsArea);
                };
                sidebar.appendChild(btn);
            });

            if (regions.length > 0) displayPlants(grouped[regions[0]], resultsArea);
        }

        function displayPlants(plants, container) {
            container.innerHTML = plants.map(p => `
                <div class="autocomplete-item" onclick="selectPlant(${p._idx})">
                    <span class="auto-name">${p.name}</span>
                    <span class="auto-info">${p.capacity}kW | ${p.address}</span>
                </div>
            `).join('');
        }

        function selectPlant(idx) {
            const p = powerPlantsData.find(item => item._idx === idx);
            map.flyTo([p.lat, p.lng], 15);
            openSheet(p);
            autocompleteList.style.display = 'none';
        }

        function openSheet(p) {
            document.getElementById('sheetName').textContent = p.name;
            document.getElementById('sheetAddress').textContent = p.address;
            document.getElementById('sheetCapacity').textContent = p.capacity + " kW";
            document.getElementById('bottomSheet').classList.add('open');
        }

        searchInput.addEventListener('input', (e) => renderSearchUI(e.target.value));
        searchInput.addEventListener('focus', () => renderSearchUI());
        document.addEventListener('click', (e) => {
            if (!document.getElementById('searchContainer').contains(e.target)) {
                autocompleteList.style.display = 'none';
            }
        });
    </script>
</body>
</html>
